name: 08 - Using Variables

on:
  push:
  workflow_dispatch:

env:
  WORKFLOW_VAR: "I am a workflow env var"
  OVERWRITTEN: "I will be overwritten"
  UNDEFINED_VAR_WITH_DEFAULT: ${{ vars.UNDEFINED_VAR || 'Default Value' }}


jobs:
  echo:
    env:
      JOB_VAR: "I am a job env var"
      OVERWRITTEN: "I have been overwritten at the job level"
    runs-on: ubuntu-latest
    steps:
      - name: Print Env Variables
        env:
          STEP_VAR: "I am a step env var"
          STEP_VAR2: "I am another step variable"
        run: |
          echo "WORKFLOW_VAR: $WORKFLOW_VAR"
          echo "JOB_VAR: $JOB_VAR"
          echo "STEP_VAR: $STEP_VAR"
          echo "OVERWRITTEN: $OVERWRITTEN"
      - name: Print Overridden Variable
        env:
          OVERWRITTEN: "I have been overwritten at the step level"
        run: |
          echo "OVERWRITTEN at step level: $OVERWRITTEN"
  echo2:
    runs-on: ubuntu-latest
    steps:
      - name: Print Variables
        run: |
          echo "Org var: ${{ vars.ORG_VAR }}"
          echo "Org overwritten var: ${{ vars.ORG_OVERWRITTEN_VAR }}"
          echo "Repo var: ${{ vars.REPO_VAR }}"
  echo-prod:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Print Prod Variables
        run: |
          echo "Org var: ${{ vars.ORG_VAR }}"
          echo "Org overwritten var: ${{ vars.ORG_OVERWRITTEN_VAR }}"
          echo "Repo var: ${{ vars.REPO_VAR }}"
          echo "Environment var: ${{ vars.TARGET_VAR }}"
  echo-undefined:
    runs-on: ubuntu-latest
    steps:
      - name: Print Undefined Variable
        run: |
          echo "Org var: ${{ env.UNDEFINED_VAR_WITH_DEFAULT }}"
